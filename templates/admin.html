<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Admin Dashboard</title>
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(135deg, #1e3a5f 0%, #2d1b69 100%);
            min-height: 100vh;
            padding: 40px 0;
        }
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            background: #ffffff;
            padding: 40px;
        }
        .card h2 {
            font-weight: 700;
            color: #1e3a5f;
        }
        .btn-danger {
            border-radius: 8px;
            font-weight: 500;
        }
        .btn-primary {
            background: linear-gradient(90deg, #1e3a5f, #2d1b69);
            border: none;
            border-radius: 8px;
            font-weight: 600;
        }
        .badge {
            font-size: 0.85rem;
            padding: 6px 12px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="d-flex justify-content-between align-items-center">
                <h2>User Management Portal</h2>
                <a href="/logout" class="btn btn-outline-danger btn-sm">Logout Admin</a>
            </div>
            <hr>
            <table class="table table-hover mt-4">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Full Name</th>
                        <th>Email</th>
                        <th>Plan</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr>
                        <td>{{ user[0] }}</td>
                        <td>{{ user[1] }}</td>
                        <td>{{ user[2] }}</td>
                        <td><span class="badge bg-primary">{{ user[4] }}</span></td>
                        <td>
<button class="btn btn-danger btn-sm" onclick="showDeleteModal({{ user[0] }})">Delete</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <div class="mt-4">
                <a href="/" class="btn btn-primary">Add New User</a>
            </div>
        </div>
    </div>
    <div id="deleteModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:#1e1e2e; border-radius:16px; padding:40px; width:400px; text-align:center; border:1px solid #ff4444; box-shadow:0 0 30px rgba(255,68,68,0.3);">
        <div style="font-size:50px; margin-bottom:15px;">⚠️</div>
        <h2 style="color:#fff; margin-bottom:10px;">Delete User?</h2>
        <p style="color:#aaa; margin-bottom:30px;">This action cannot be undone. User will be permanently deleted.</p>
        <div style="display:flex; gap:15px; justify-content:center;">
            <button onclick="closeModal()" style="padding:12px 30px; border-radius:8px; border:1px solid #555; background:transparent; color:#fff; cursor:pointer; font-size:15px;">Cancel</button>
            <a id="confirmDeleteBtn" href="#" style="padding:12px 30px; border-radius:8px; border:none; background:#ff4444; color:#fff; cursor:pointer; font-size:15px; text-decoration:none;">Delete</a>
        </div>
    </div>
</div>

<script>
function showDeleteModal(userId) {
    document.getElementById('deleteModal').style.display = 'flex';
    document.getElementById('confirmDeleteBtn').href = '/delete_user/' + userId;
}
function closeModal() {
    document.getElementById('deleteModal').style.display = 'none';
}
</script>

</body>
</body>
</html>

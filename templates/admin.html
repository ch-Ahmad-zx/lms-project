<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Admin Dashboard</title>
</head>
<body class="p-5 bg-light">
    <div class="container bg-white p-4 shadow rounded">
        <div class="d-flex justify-content-between align-items-center">
            <h2>User Management Portal</h2>
            <a href="/logout" class="btn btn-outline-danger btn-sm">Logout Admin</a>
        </div>
        <hr>

        <table class="table table-hover mt-4">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Plan</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user['id'] }}</td>
                    <td>{{ user['username'] }}</td>
                    <td>{{ user['email'] }}</td>
                    <td><span class="badge bg-info text-dark">{{ user['role'] }}</span></td>
                    <td>
                        <a href="/delete/{{ user['id'] }}" class="btn btn-danger btn-sm" onclick="return confirm('Delete this user?')">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        
        <div class="mt-4">
            <a href="/" class="btn btn-primary">Add New User</a>
        </div>
    </div>
</body>
</html>

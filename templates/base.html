<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <title>LMS Portal</title>
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(135deg, #1e3a5f 0%, #2d1b69 100%);
            min-height: 100vh;
        }
        .navbar {
            background: linear-gradient(90deg, #1e3a5f 0%, #2d1b69 100%);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            padding: 15px 0;
        }
        .navbar-brand {
            font-size: 1.4rem;
            font-weight: 700;
            color: white !important;
        }
        .nav-link {
            color: rgba(255,255,255,0.85) !important;
            font-weight: 500;
            margin: 0 5px;
            transition: color 0.2s;
        }
        .nav-link:hover { color: white !important; }
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            background: #ffffff;
            padding: 40px;
        }
        .card h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1e3a5f;
            margin-bottom: 25px;
        }
        .form-label {
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }
        .form-control, .form-select {
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            padding: 12px 15px;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .form-control:focus, .form-select:focus {
            border-color: #2d1b69;
            box-shadow: 0 0 0 4px rgba(45,27,105,0.15);
        }
        .mb-3 { margin-bottom: 20px !important; }
        .btn-primary {
            background: linear-gradient(90deg, #1e3a5f, #2d1b69);
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background: linear-gradient(90deg, #2d1b69, #1e3a5f);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(45,27,105,0.4);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-5">
        <div class="container">
            <a class="navbar-brand" href="/">🛡️ LMS Portal</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
    <span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Register</a></li>
                    <li class="nav-item"><a class="nav-link" href="/login">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin">Admin Panel</a></li>
                    <li class="nav-item"><a class="nav-link" href="/watch_movies">🎬 Movie Portal</a></li>
                    {% if session.get('user_id') %}
                    <li class="nav-item"><a class="nav-link fw-bold text-warning" href="/logout">Logout</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

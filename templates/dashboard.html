<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin-top: 50px;
        }
        .key-box {
            background: #1e293b;
            color: #38bdf8;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            border: 1px dashed #38bdf8;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <div class="glass-card">
                    <h2 class="mb-4 text-info">License Management</h2>
                    <p class="text-secondary">Your Product Key:</p>
                    <div class="key-box mb-3" id="key">{{ license_key }}</div>
<button class="btn btn-info btn-sm mb-4" onclick="copyKey('{{ license_key }}')">Copy Key</button>                    
                    <div class="row border-top pt-4 border-secondary">
                        <div class="col-6 text-start">
                            <small class="text-secondary d-block">STATUS</small>
                            <span class="badge bg-success">ACTIVE</span>
                        </div>
                        <div class="col-6 text-end">
                            <small class="text-secondary d-block">EXPIRY DATE</small>
                            <span class="text-warning fw-bold">{{ expiry_date }}</span>
                        </div>
                    </div>
                    <div class="mt-4">
                       <a href="/resources" class="btn btn-primary btn-sm">🔐 Premium Resources</a>
                        <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
function copyKey(key) {
    navigator.clipboard.writeText(key);
    Swal.fire({
        toast: true,
        position: 'top-end',
        icon: 'success',
        title: 'Key copied to clipboard!',
        showConfirmButton: false,
        timer: 2000,
        timerProgressBar: true,
        background: '#1a1a2e',
        color: '#fff'
    });
}
</script>
</body>
</html>

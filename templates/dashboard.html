{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card text-center">
            <h2 style="color: #1e3a5f;">🎉 Registration Successful!</h2>
            <hr>
            <h4 class="mb-3">Welcome, {{ name }}!</h4>
            <div class="p-3 rounded mb-3" style="background: #1e3a5f; color: #fbbf24;">
                <strong>License Key:</strong><br>
                <span style="font-size: 1.1rem; letter-spacing: 1px;">{{ key }}</span>
            </div>
            <p><strong>Expires:</strong> {{ expiry }}</p>
            <div class="d-grid gap-2 mt-3">
                <button onclick="window.print()" class="btn btn-primary">Download/Print License</button>
                <a href="/logout" class="btn btn-outline-danger">Logout</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS Portal | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .license-display {
            background: #0f172a;
            border: 1px dashed #38bdf8;
            padding: 20px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            color: #38bdf8;
            font-size: 1.2rem;
            word-break: break-all;
        }
        .stat-label { color: #94a3b8; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { color: #ffffff; font-weight: 600; font-size: 1.1rem; }
        .btn-copy { background: #38bdf8; color: #0f172a; font-weight: bold; border-radius: 8px; transition: 0.3s; }
        .btn-copy:hover { background: #7dd3fc; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="glass-card">
                    <div class="d-flex justify-content-between align-items-center mb-5">
                        <div>
                            <h4 class="mb-0 text-white">Welcome Back!</h4>
                            <p class="text-info mb-0 small">{{ session['email'] }}</p>
                        </div>
                        <a href="/logout" class="btn btn-sm btn-outline-danger">Logout</a>
                    </div>

                    <div class="text-center mb-5">
                        <p class="stat-label mb-2">Your License Key</p>
                        <div class="license-display mb-3" id="licenseKey">{{ license_key }}</div>
                        <button class="btn btn-copy px-4" onclick="copyKey()">Copy Key</button>
                    </div>

                    <div class="row g-4 text-center">
                        <div class="col-6 border-end border-secondary">
                            <p class="stat-label mb-1">Status</p>
                            <span class="badge bg-success px-3 py-2">ACTIVE</span>
                        </div>
                        <div class="col-6">
                            <p class="stat-label mb-1">Expiry Date</p>
                            <p class="stat-value mb-0 text-warning">{{ expiry_date }}</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function copyKey() {
            const key = document.getElementById('licenseKey').innerText;
            navigator.clipboard.writeText(key);
            alert("Copied to clipboard!");
        }
    </script>
</body>
</html>

{% extends "base.html" %}

{% block content %}
<div class="container d-flex justify-content-center mt-5">
    <div class="card p-4 shadow" style="width: 400px; border-radius: 15px;">
        <h3 class="text-center mb-4">Login Portal</h3>

        {% if error %}
        <div class="alert alert-danger p-2 text-center" style="font-size: 14px;">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-success w-100 mt-2" style="border-radius: 8px;">Login</button>
        </form>
        
        <div class="text-center mt-3">
            <small>Don't have an account? <a href="/">Register here</a></small>
        </div>
    </div>
</div>
{% endblock %}

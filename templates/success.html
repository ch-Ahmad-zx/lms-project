{% extends "base.html" %}
{% block content %}
<div class="container mt-5 text-center">
    <div class="card shadow-lg p-5 border-0">
        <div class="mb-4">
            <h1 style="font-size: 60px;">✅</h1>
        </div>
        <h2 class="text-success fw-bold">Payment Successful!</h2>
        <p class="text-muted">Thank you for your purchase. Your account has been upgraded to <strong>Pro</strong>.</p>
        
        <div class="alert alert-info mt-4">
            <h5 class="mb-2">Your New License Key:</h5>
            <code style="font-size: 24px; letter-spacing: 2px;" class="fw-bold text-dark">
                <code style="font-size: 24px; letter-spacing: 2px;" class="fw-bold text-dark">
    {{ key }}
</code>
            </code>
        </div>

        <div class="mt-4">
            <a href="/dashboard" class="btn btn-primary btn-lg px-5">Go to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}

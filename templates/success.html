{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card text-center">
            <h1>✅</h1>
            <h2 style="color: #1e3a5f;">Payment Successful!</h2>
            <p class="text-muted">Your account has been activated successfully.</p>
            <div class="p-3 rounded my-3" style="background: #1e3a5f; color: #fbbf24;">
                <h5 class="mb-2">Your License Key:</h5>
                <code style="font-size: 1.2rem; letter-spacing: 2px; color: #fbbf24;">{{ key }}</code>
            </div>
            <a href="/dashboard" class="btn btn-primary btn-lg px-5 mt-3">Go to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
